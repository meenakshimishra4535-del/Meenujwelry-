<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handmade Jewelry Store</title>
  <style>
    body {font-family: Arial, sans-serif; margin:0; background:#fffaf7;}
    header {background:#d4a373; color:white; padding:15px; text-align:center;}
    nav {display:flex; justify-content:center; gap:20px; margin-top:10px;}
    nav a {color:white; text-decoration:none; font-weight:bold;}
    .hero {text-align:center; padding:40px;}
    .hero h1 {color:#6b4f4f;}
    .products {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; padding:20px;}
    .card {background:white; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); text-align:center;}
    .card img {width:100%; border-radius:10px;}
    .card button {background:#d4a373; border:none; color:white; padding:10px; margin-top:10px; cursor:pointer;}
    .cart {position:fixed; right:0; top:0; background:white; width:300px; height:100%; box-shadow:-2px 0 10px rgba(0,0,0,0.2); padding:20px; overflow:auto;}
    footer {text-align:center; padding:15px; background:#d4a373; color:white;}
  </style>
</head>
<body>

<header>
  <h2>✨ Handmade Jewelry Store ✨</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Beautiful Handmade Jewelry</h1>
  <p>Unique | Elegant | Affordable</p>
</section>

<section id="products" class="products">
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Necklace</h3>
    <p>₹499</p>
    <button onclick="addToCart('Necklace',499)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Earrings</h3>
    <p>₹299</p>
    <button onclick="addToCart('Earrings',299)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Bracelet</h3>
    <p>₹399</p>
    <button onclick="addToCart('Bracelet',399)">Add to Cart</button>
  </div>
</section>

<div class="cart" id="cart">
  <h3>🛒 Cart</h3>
  <ul id="cartItems"></ul>
  <p><b>Total: ₹<span id="total">0</span></b></p>
  <button onclick="checkout()">Checkout</button>
</div>

<section id="contact" class="hero">
  <h2>Contact Us</h2>
  <p>WhatsApp: +91 XXXXX XXXXX</p>
</section>

<footer>
  <p>© 2026 Handmade Jewelry Store</p>
</footer>

<script>
  let cart = [];
  function addToCart(name, price) {
    cart.push({name, price});
    renderCart();
  }

  function renderCart() {
    let list = document.getElementById('cartItems');
    list.innerHTML = '';
    let total = 0;
    cart.forEach(item => {
      let li = document.createElement('li');
      li.textContent = item.name + ' - ₹' + item.price;
      list.appendChild(li);
      total += item.price;
    });
    document.getElementById('total').textContent = total;
  }

  function checkout() {
    alert('Order placed! Contact on WhatsApp to confirm.');
  }
</script>

</body>
</html>
